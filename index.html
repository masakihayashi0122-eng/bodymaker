<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>BodyMaker</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Rajdhani:wght@400;600;700&display=swap');
    *{box-sizing:border-box;margin:0;padding:0}
    body{background:#050a0f;color:#c8eeff;font-family:'Rajdhani',−apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;min-height:100vh;overflow-x:hidden}

    /* ── 背景グリッド ── */
    body::before{content:"";position:fixed;inset:0;background:
      linear-gradient(rgba(0,200,255,0.03) 1px,transparent 1px),
      linear-gradient(90deg,rgba(0,200,255,0.03) 1px,transparent 1px);
      background-size:40px 40px;pointer-events:none;z-index:0}
    body::after{content:"";position:fixed;inset:0;background:radial-gradient(ellipse at 50% 0%,rgba(0,150,255,0.08) 0%,transparent 60%);pointer-events:none;z-index:0}

    .header{background:rgba(5,10,20,0.95);border-bottom:1px solid rgba(0,200,255,0.3);padding:12px 16px;position:sticky;top:0;z-index:100;display:flex;justify-content:space-between;align-items:center;box-shadow:0 0 20px rgba(0,180,255,0.15)}
    .header-left .title{font-weight:700;font-size:17px;color:#00d4ff;text-shadow:0 0 10px rgba(0,212,255,0.8),0 0 20px rgba(0,212,255,0.4);letter-spacing:2px}
    .header-left .sub{color:#4a8fa8;font-size:11px;letter-spacing:1px}
    .header-right .weight{color:#00ffcc;font-weight:700;font-size:22px;text-align:right;text-shadow:0 0 10px rgba(0,255,200,0.7)}
    .header-right .date{color:#4a8fa8;font-size:11px;text-align:right}

    .content{padding:12px 14px 80px;max-width:520px;margin:0 auto;position:relative;z-index:1}

    .nav{position:fixed;bottom:0;left:0;right:0;background:rgba(5,10,20,0.97);border-top:1px solid rgba(0,200,255,0.25);display:flex;justify-content:space-around;padding:8px 0 12px;z-index:100;box-shadow:0 -5px 20px rgba(0,150,255,0.1)}
    .nav button{background:none;border:none;cursor:pointer;font-size:12px;padding:4px 8px;color:#4a8fa8;font-family:inherit;letter-spacing:1px;transition:all 0.2s}
    .nav button.active{color:#00d4ff;font-weight:700;text-shadow:0 0 8px rgba(0,212,255,0.8)}

    /* ── カード ── */
    .card{background:rgba(8,18,32,0.9);border-radius:4px;padding:16px;border:1px solid rgba(0,180,255,0.2);margin-bottom:12px;position:relative;overflow:hidden;transition:border-color 0.3s,box-shadow 0.3s}
    .card::before{content:"";position:absolute;top:0;left:0;right:0;height:1px;background:linear-gradient(90deg,transparent,rgba(0,212,255,0.6),transparent);animation:scanline 3s linear infinite}
    @keyframes scanline{0%{transform:scaleX(0);opacity:0}50%{opacity:1}100%{transform:scaleX(1);opacity:0}}
    .card:hover{border-color:rgba(0,200,255,0.4);box-shadow:0 0 15px rgba(0,180,255,0.1),inset 0 0 20px rgba(0,150,255,0.03)}

    .card-title{color:#00d4ff;font-weight:700;font-size:14px;margin-bottom:12px;letter-spacing:2px;text-shadow:0 0 8px rgba(0,212,255,0.5)}
    .grid2{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:12px}

    /* ── KPI ── */
    .kpi{background:rgba(0,20,40,0.8);border-radius:4px;padding:12px;border:1px solid rgba(0,180,255,0.15);text-align:center;position:relative;overflow:hidden;transition:all 0.3s}
    .kpi::after{content:"";position:absolute;bottom:0;left:0;right:0;height:1px;background:linear-gradient(90deg,transparent,rgba(0,212,255,0.4),transparent)}
    .kpi:hover{border-color:rgba(0,212,255,0.4);box-shadow:0 0 12px rgba(0,180,255,0.15)}
    .kpi-label{color:#4a8fa8;font-size:11px;margin-bottom:4px;letter-spacing:1px}
    .kpi-val{font-size:22px;font-weight:700}
    .kpi-sub{color:#4a8fa8;font-size:11px;margin-top:2px}

    /* ── インプット ── */
    input,select{background:rgba(0,15,30,0.9);border:1px solid rgba(0,180,255,0.25);border-radius:3px;color:#c8eeff;padding:10px 12px;width:100%;font-size:15px;outline:none;margin-top:4px;font-family:inherit;transition:all 0.3s}
    input:focus,select:focus{border-color:rgba(0,212,255,0.7);box-shadow:0 0 12px rgba(0,180,255,0.2),inset 0 0 8px rgba(0,150,255,0.05)}
    label{color:#4a8fa8;font-size:13px;display:block;letter-spacing:1px}

    /* ── ボタン ── */
    .btn{border:none;border-radius:3px;padding:12px;font-size:15px;font-weight:700;cursor:pointer;width:100%;margin-top:8px;font-family:inherit;letter-spacing:2px;transition:all 0.3s;position:relative;overflow:hidden}
    .btn-primary{background:linear-gradient(135deg,rgba(0,100,200,0.8),rgba(0,180,255,0.6));color:#fff;border:1px solid rgba(0,212,255,0.5);text-shadow:0 0 8px rgba(0,212,255,0.8)}
    .btn-primary:hover{box-shadow:0 0 20px rgba(0,180,255,0.4);border-color:rgba(0,212,255,0.8)}
    .btn-primary::after{content:"";position:absolute;inset:0;background:linear-gradient(135deg,transparent 40%,rgba(255,255,255,0.05) 50%,transparent 60%);transform:translateX(-100%);transition:transform 0.4s}
    .btn-primary:hover::after{transform:translateX(100%)}

    /* ── 保存ボタン ── */
    .btn-save{background:linear-gradient(135deg,rgba(0,150,100,0.8),rgba(0,255,180,0.4));color:#00ffcc;font-size:17px;padding:16px;border-radius:4px;margin-top:12px;border:1px solid rgba(0,255,180,0.4);text-shadow:0 0 10px rgba(0,255,180,0.8);letter-spacing:3px;font-weight:700;cursor:pointer;width:100%;font-family:inherit;transition:all 0.3s;position:relative;overflow:hidden}
    .btn-save:hover{box-shadow:0 0 25px rgba(0,255,180,0.3);border-color:rgba(0,255,180,0.7)}

    /* ── 保存フラッシュアニメーション ── */
    @keyframes circuitFlash{
      0%{opacity:0;transform:scale(0.8)}
      20%{opacity:1;transform:scale(1.02)}
      50%{opacity:1}
      100%{opacity:0;transform:scale(1.05)}
    }
    @keyframes pulseGlow{
      0%{box-shadow:0 0 5px rgba(0,255,180,0.3)}
      50%{box-shadow:0 0 30px rgba(0,255,180,0.8),0 0 60px rgba(0,200,255,0.4)}
      100%{box-shadow:0 0 5px rgba(0,255,180,0.3)}
    }
    .save-flash{position:fixed;inset:0;z-index:999;pointer-events:none;display:flex;align-items:center;justify-content:center;background:rgba(0,20,40,0.3);animation:circuitFlash 1.2s ease forwards}
    .save-flash-text{color:#00ffcc;font-size:32px;font-weight:700;letter-spacing:6px;text-shadow:0 0 20px rgba(0,255,180,1),0 0 40px rgba(0,255,180,0.6),0 0 80px rgba(0,200,255,0.4);border:1px solid rgba(0,255,180,0.6);padding:20px 40px;background:rgba(0,20,40,0.8);font-family:'Rajdhani',sans-serif}
    .save-flash-text::before{content:"";position:absolute;inset:-1px;border:1px solid rgba(0,255,180,0.3);animation:pulseGlow 0.6s ease infinite}

    /* ── 同期ステータス ── */
    .sync-ok{color:#00ffcc;text-shadow:0 0 6px rgba(0,255,200,0.6)}
    .sync-err{color:#ff4466;text-shadow:0 0 6px rgba(255,50,80,0.6)}
    .sync-ing{color:#00aaff;text-shadow:0 0 6px rgba(0,170,255,0.6)}

    .info-grid{display:grid;grid-template-columns:1fr 1fr;gap:3px 10px;font-size:12px;margin-top:8px}
    .info-grid span:nth-child(odd){color:#4a8fa8}
    .info-grid span:nth-child(even){color:#c8eeff;text-align:right}

    /* ── トレーニング ── */
    .ex-item{background:rgba(0,15,30,0.9);border-radius:3px;padding:8px 12px;display:flex;justify-content:space-between;align-items:center;margin-bottom:6px;border:1px solid rgba(0,180,255,0.15)}
    .ex-name{color:#00d4ff;font-size:13px;font-weight:700;letter-spacing:1px}
    .ex-detail{color:#4a8fa8;font-size:11px}
    .ex-del{background:none;border:none;color:#ff4466;font-size:18px;cursor:pointer;text-shadow:0 0 6px rgba(255,50,80,0.5)}

    /* ── カテゴリ・種目ボタン ── */
    .cat-btn{border-radius:3px!important;letter-spacing:1px;font-family:inherit;font-weight:600;transition:all 0.2s!important}
    .cat-btn:hover{box-shadow:0 0 10px rgba(0,180,255,0.3)!important}
    .cat-btn.active{box-shadow:0 0 15px rgba(0,180,255,0.5)!important}

    .grid3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:6px}
    table{width:100%;border-collapse:collapse;font-size:11px}
    th,td{padding:4px 5px;border-bottom:1px solid rgba(0,150,255,0.1);text-align:right;white-space:nowrap}
    th{color:#4a8fa8;letter-spacing:1px}
    td:first-child,th:first-child{text-align:left}
    .tab{display:none}.tab.active{display:block}

    /* ── 週次レポート ── */
    .week-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:6px;font-size:12px;text-align:center}
    .week-cell{padding:5px 4px;border-radius:3px}
    .week-head{background:rgba(0,15,30,0.8);color:#4a8fa8;font-weight:700;letter-spacing:1px}
    .week-this{color:#c8eeff;border:1px solid rgba(0,180,255,0.2)}
    .week-last{color:#4a8fa8;border:1px solid rgba(0,100,150,0.15)}

    /* ── グラフ ── */
    .chart-bar-wrap{display:flex;align-items:flex-end;gap:2px;height:100px;margin-top:8px}
    .chart-bar-col{display:flex;flex-direction:column;align-items:center;flex:1}
    .chart-bar{border-radius:1px 1px 0 0;width:100%;min-height:2px;position:relative}
    .chart-bar::after{content:"";position:absolute;top:0;left:0;right:0;height:2px;filter:blur(2px);opacity:0.8}
    .chart-label{color:#2a5a6a;font-size:9px;margin-top:2px;writing-mode:vertical-rl;transform:rotate(180deg);height:28px;overflow:hidden}

    .scatter-wrap{position:relative;height:180px;margin-top:8px;border-left:1px solid rgba(0,150,255,0.2);border-bottom:1px solid rgba(0,150,255,0.2)}
    .scatter-dot{position:absolute;width:8px;height:8px;border-radius:50%;background:#00d4ff;transform:translate(-50%,50%);opacity:0.8;box-shadow:0 0 6px rgba(0,212,255,0.8)}

    .goal-result{background:rgba(0,15,30,0.8);border-radius:3px;padding:10px 12px;margin-top:10px;border:1px solid rgba(0,180,255,0.15)}
    .tdee-num{color:#00d4ff;font-size:40px;font-weight:800;line-height:1.1;text-shadow:0 0 15px rgba(0,212,255,0.6)}
    .progress-wrap{background:rgba(0,15,30,0.8);border-radius:3px;height:10px;overflow:hidden;position:relative;margin:6px 0;border:1px solid rgba(0,180,255,0.15)}
    .progress-bg{position:absolute;inset:0;background:rgba(0,100,180,0.2);border-radius:3px}
    .progress-fill{position:absolute;left:0;top:0;height:100%;border-radius:3px;box-shadow:0 0 8px currentColor}

    /* ── スクロールバー ── */
    ::-webkit-scrollbar{width:4px;height:4px}
    ::-webkit-scrollbar-track{background:#050a0f}
    ::-webkit-scrollbar-thumb{background:rgba(0,180,255,0.3);border-radius:2px}
  </style>
</head>

const fmt=d=>d?d.slice(5).replace("-","/"):"";
const today=()=>new Date().toISOString().slice(0,10);
const avg=arr=>arr.length?arr.reduce((a,b)=>a+b,0)/arr.length:0;

function mergeData(seed,stored=[]){
  const m={};
  [...seed,...stored].forEach(r=>{m[r.date]={...(m[r.date]||{}),...r};});
  return Object.values(m).sort((a,b)=>a.date>b.date?1:-1);
}

function getCategories(){
  const custom=JSON.parse(localStorage.getItem("bm-categories")||"{}");
  const merged={};
  Object.keys(CATEGORY_DEFAULT).forEach(k=>{merged[k]=[...CATEGORY_DEFAULT[k],...(custom[k]||[])];});
  Object.keys(custom).forEach(k=>{if(!merged[k])merged[k]=custom[k];});
  return merged;
}

function saveCustomExercise(cat,name){
  const custom=JSON.parse(localStorage.getItem("bm-categories")||"{}");
  if(!custom[cat])custom[cat]=[];
  if(!custom[cat].includes(name))custom[cat].push(name);
  localStorage.setItem("bm-categories",JSON.stringify(custom));
}
function saveDraftSets(ex,sets){
  localStorage.setItem("bm-draft-"+ex,JSON.stringify(sets));
}
function loadDraftSets(ex){
  return JSON.parse(localStorage.getItem("bm-draft-"+ex)||"[]");
}
function clearDraftSets(ex){
  localStorage.removeItem("bm-draft-"+ex);
}
function weekStart(d){
  const dt=new Date(d); dt.setDate(dt.getDate()-dt.getDay()+1);
  return dt.toISOString().slice(0,10);
}

// ── GAS通信 ──
async function gasPost(action,data){
  try{
    const r=await fetch(GAS_URL,{method:"POST",headers:{"Content-Type":"text/plain"},body:JSON.stringify({action,data})});
    return await r.json();
  }catch(e){return null;}
}

// ── 初期化 ──
async function init(){
  const stored=JSON.parse(localStorage.getItem("bm-data")||"[]");
  allData=mergeData(SEED,stored);
  updateHeader();
  try{renderAll();}catch(e){
    document.getElementById("tab-dash").innerHTML=`<div style="color:#ef4444;padding:20px;font-size:13px">エラー: ${e.message}</div>`;
  }
  setSub('<span class="sync-ing">⟳ 同期中...</span>');
  try{
    const timeout=new Promise((_,rej)=>setTimeout(()=>rej(new Error("timeout")),10000));
    const res=await Promise.race([gasPost("get_daily",{}),timeout]);
    if(res&&res.success&&res.data.length>0){
      const conv=res.data.map(r=>({
        date:r.date,
        weight:r.weight_kg?parseFloat(r.weight_kg):undefined,
        cal:r.calories_in?parseInt(r.calories_in):undefined,
        p:r.protein_g?parseFloat(r.protein_g):undefined,
        c:r.carbs_g?parseFloat(r.carbs_g):undefined,
        f:r.fat_g?parseFloat(r.fat_g):undefined,
        steps:r.steps?parseInt(r.steps):undefined,
        sleep:r.sleep_hours?parseFloat(r.sleep_hours):undefined,
        sleepScore:r.sleep_score?parseInt(r.sleep_score):undefined,
        trained:r.trained?1:undefined,
      })).filter(r=>r.date);
      allData=mergeData(SEED,[...stored,...conv]);
      renderAll();
    }
    // カスタム種目をスプシから取得してマージ
    const customRes=await Promise.race([gasPost("get_custom",{}),timeout]);
    if(customRes&&customRes.success&&Object.keys(customRes.data).length>0){
      const stored_custom=JSON.parse(localStorage.getItem("bm-categories")||"{}");
      const merged={...stored_custom};
      Object.keys(customRes.data).forEach(cat=>{
        if(!merged[cat])merged[cat]=[];
        customRes.data[cat].forEach(ex=>{if(!merged[cat].includes(ex))merged[cat].push(ex);});
      });
      localStorage.setItem("bm-categories",JSON.stringify(merged));

function miniLineChart(data,key,color){
  if(!data.length) return '<div style="color:#64748b;font-size:12px;text-align:center;padding:20px">データなし</div>';
  const vals=data.map(d=>d[key]);
  const mn=Math.min(...vals),mx=Math.max(...vals),range=mx-mn||1;
  const minW=Math.max(100,data.length*18);
  return `<div style="overflow-x:auto;-webkit-overflow-scrolling:touch"><div class="chart-bar-wrap" style="min-width:${minW}px">${data.map(d=>`<div class="chart-bar-col"><div class="chart-bar" style="height:${Math.max(4,((d[key]-mn)/range)*88)}px;background:${color}"></div><div class="chart-label">${fmt(d.date)}</div></div>`).join("")}</div></div>`;
}
function miniBarChart(data,key,color){
  if(!data.length) return '<div style="color:#64748b;font-size:12px;text-align:center;padding:20px">データなし</div>';
  const mx=Math.max(...data.map(d=>d[key]));
  const minW=Math.max(100,data.length*18);
  return `<div style="overflow-x:auto;-webkit-overflow-scrolling:touch"><div class="chart-bar-wrap" style="min-width:${minW}px">${data.map(d=>`<div class="chart-bar-col"><div class="chart-bar" style="height:${Math.max(4,(d[key]/mx)*88)}px;background:${color}"></div><div class="chart-label">${fmt(d.date)}</div></div>`).join("")}</div></div>`;
}
function setPeriod(p){period=p;renderDash();}
function saveGoal(){localStorage.setItem("bm-goal",JSON.stringify(goal));renderDash();}
function getFiltered(){
  if(period==="all") return allData;
  const days=period==="3m"?90:30;
  const cut=new Date(); cut.setDate(cut.getDate()-days);
  return allData.filter(d=>new Date(d.date)>=cut);
}
function weeklyReport(){
  const now=new Date();
  const ws=weekStart(now.toISOString().slice(0,10));
  const prev=new Date(ws); prev.setDate(prev.getDate()-7);
  const ps=prev.toISOString().slice(0,10);
  const calc=arr=>({avgCal:Math.round(avg(arr.filter(d=>d.cal).map(d=>d.cal)))||0,avgP:Math.round(avg(arr.filter(d=>d.p).map(d=>d.p)))||0,trainDays:arr.filter(d=>d.trained).length,avgSleep:avg(arr.filter(d=>d.sleep).map(d=>d.sleep)).toFixed(1)});
  return {this:calc(allData.filter(d=>d.date>=ws)),last:calc(allData.filter(d=>d.date>=ps&&d.date<ws))};
}
function goalCalc(){
  if(!goal.weight) return null;
  const ws=allData.filter(d=>d.weight);
  if(ws.length<14) return null;
  const r=ws.slice(-14);
  const wF=avg(r.slice(0,7).map(d=>d.weight));
  const wL=avg(r.slice(7).map(d=>d.weight));
  const rate=(wL-wF)/7;
  if(rate>=0) return {msg:"現在体重が増加傾向のため予測不可"};
  const cur=ws[ws.length-1].weight;
  const diff=cur-parseFloat(goal.weight);
  const days=Math.ceil(diff/Math.abs(rate));
  const eta=new Date(); eta.setDate(eta.getDate()+days);
  return {days,eta:eta.toLocaleDateString("ja-JP"),ratePerWeek:(rate*7).toFixed(2),current:cur};
}
function calcTDEE(){
  const s=[...allData].sort((a,b)=>a.date>b.date?1:-1);
  const last=s[s.length-1]?.date; if(!last) return null;
  const mid=new Date(last); mid.setDate(mid.getDate()-14);
  const start=new Date(last); start.setDate(start.getDate()-27);
  const ms=mid.toISOString().slice(0,10),ss=start.toISOString().slice(0,10);
  const prev=s.filter(d=>d.date>=ss&&d.date<ms);
  const curr=s.filter(d=>d.date>=ms);
  const all28=s.filter(d=>d.date>=ss);
  const wF=prev.filter(d=>d.weight).map(d=>d.weight);
  const wL=curr.filter(d=>d.weight).map(d=>d.weight);
  const cal=all28.filter(d=>d.cal).map(d=>d.cal);
  if(wF.length<3||wL.length<3||cal.length<10) return null;
  const wd=avg(wL)-avg(wF);
  const ac=avg(cal);
  const tdee=Math.round(ac-(wd*7700/28));
  return {tdee,ac:Math.round(ac),wd:wd.toFixed(3),wF:avg(wF).toFixed(2),wL:avg(wL).toFixed(2),surplus:Math.round(ac-tdee),wFd:wF.length,wLd:wL.length};
}

function updatePFC(){
  const p=parseFloat(document.getElementById("f-p").value)||0;
  const c=parseFloat(document.getElementById("f-c").value)||0;
  const f=parseFloat(document.getElementById("f-f").value)||0;

  if(p&&c&&f){el.style.display="block";el.textContent=`PFC合算: ${Math.round(p*4+c*4+f*9)} kcal`;}
  else el.style.display="none";
}
function renderExButtons(cat, selectedEx, cats) {
  if (!cat || !cats[cat]) return "";
  return cats[cat].map(ex => {
    const isDefault = (CATEGORY_DEFAULT[cat] || []).includes(ex);
    const isSel = selectedEx === ex;
    const bg = isSel ? "rgba(0,120,80,0.6)" : "rgba(0,15,30,0.9)";
    const col = isSel ? "#00ffcc" : "#4a8fa8";
    const border = isSel ? "rgba(0,255,180,0.6)" : "rgba(0,150,200,0.2)";
    const glow = isSel ? "text-shadow:0 0 8px rgba(0,255,180,0.8);box-shadow:0 0 10px rgba(0,200,150,0.3);" : "";
    const br = isDefault ? "3px" : "3px 0 0 3px";
    const exEsc = ex.replace(/'/g, "\\'");
    const catEsc = (cat || "").replace(/'/g, "\\'");
    let html = `<div style="display:flex;align-items:center">`;
    html += `<button onclick="selectEx('${exEsc}')" style="background:${bg};color:${col};border:1px solid ${border};border-radius:${br};padding:5px 12px;font-size:12px;cursor:pointer;font-family:inherit;font-weight:600;letter-spacing:1px;${glow}">${ex}</button>`;
    if (!isDefault) {
      html += `<button onclick="deleteCustomEx('${catEsc}','${exEsc}');renderInput()" style="background:rgba(255,20,50,0.2);border:1px solid rgba(255,50,80,0.4);border-left:none;border-radius:0 3px 3px 0;color:#ff4466;font-size:13px;cursor:pointer;padding:5px 7px;line-height:1;font-weight:700">×</button>`;
    }
    html += `</div>`;
    return html;
  }).join("");
}

    p:parseFloat(document.getElementById("f-p").value)||undefined,
    c:parseFloat(document.getElementById("f-c").value)||undefined,
    f:parseFloat(document.getElementById("f-f").value)||undefined,
    steps:parseInt(document.getElementById("f-steps").value)||undefined,
    sleep:parseFloat(document.getElementById("f-sleep").value)||undefined,
    sleepScore:parseInt(document.getElementById("f-score").value)||undefined,
trained:(exercises.length>0||workouts.some(w=>w.date===date))?1:undefined
  };
  const stored=JSON.parse(localStorage.getItem("bm-data")||"[]");
  const updated=[...stored.filter(x=>x.date!==date),entry];
  localStorage.setItem("bm-data",JSON.stringify(updated));
  allData=mergeData(SEED,updated);
  await gasPost("save_daily",{date,weight_kg:entry.weight??"",calories_in:entry.cal??"",protein_g:entry.p??"",carbs_g:entry.c??"",fat_g:entry.f??"",steps:entry.steps??"",sleep_hours:entry.sleep??"",sleep_score:entry.sleepScore??"",trained:entry.trained??""});
  if(exercises.length>0){
    const wo={date,exercises};
    const wos=JSON.parse(localStorage.getItem("bm-workouts")||"[]");
    const wos2=[...wos.filter(x=>x.date!==date),wo];
    localStorage.setItem("bm-workouts",JSON.stringify(wos2));
    workouts=wos2;
    await gasPost("save_workout",{date,exercises});
  }
  exercises=[];renderAll();
  // 魔術回路フラッシュ
  const flash=document.createElement("div");
  flash.className="save-flash";
  flash.innerHTML='<div class="save-flash-text">◈ DATA SAVED ◈</div>';
  document.body.appendChild(flash);
  setTimeout(()=>flash.remove(),1200);
  btn.textContent="◈ SAVED ◈";
  setTimeout(()=>{btn.textContent="💾 保存する";},2000);
}

// ── 分析 ──
function renderAnalysis(){
  const wt=weeklyTrain();
  const pr=buildPR();
  const scatter=buildScatter();
  document.getElementById("tab-analysis").innerHTML=`
    <div class="card">
      <div class="card-title">🏆 種目別PR・推移</div>
      ${Object.keys(pr).length===0?'<div style="color:#64748b;font-size:13px;text-align:center;padding:16px">入力タブでトレーニングを記録するとPRが表示されます</div>':`
        <div style="display:flex;flex-wrap:wrap;gap:6px;margin-bottom:12px">
          ${Object.keys(pr).map(n=>`<button onclick="selectPR('${n}')" style="background:${prTab===n?"#6c63ff":"#0f1117"};color:${prTab===n?"#fff":"#64748b"};border:1px solid ${prTab===n?"#6c63ff":"#2a2d3a"};border-radius:20px;padding:5px 12px;font-size:12px;cursor:pointer">${n}</button>`).join("")}
        </div>
        <div id="pr-detail">${renderPRDetail(pr)}</div>
      `}
    </div>
    <div class="card">
      <div class="card-title">💪 週次トレーニング頻度</div>
      ${wt.length?miniBarChart(wt.map(w=>({date:"20"+w.week,cal:w.count})),"cal","#22c55e"):'<div style="color:#64748b;text-align:center;padding:16px;font-size:13px">データなし</div>'}
    </div>
    <div class="card">
      <div class="card-title">📊 カロリー vs 体重変化</div>
      <div style="color:#64748b;font-size:12px;margin-bottom:8px">相関係数: <span style="font-weight:700;color:${scatter.corr>0?"#ef4444":"#22c55e"}">${scatter.corr?scatter.corr.toFixed(3):"データ不足"}</span></div>
      ${renderScatter(scatter.data)}
    </div>
    <div class="card">
      <div class="card-title">📋 直近7日サマリー</div>
      <div style="overflow-x:auto"><table>
        <tr><th>日付</th><th>体重</th><th>Cal</th><th>P</th><th>C</th><th>F</th><th>筋トレ</th></tr>
        ${allData.slice(-7).reverse().map(d=>`<tr><td style="color:#64748b">${fmt(d.date)}</td><td style="color:#22c55e">${d.weight||"-"}</td><td>${d.cal||"-"}</td><td style="color:#f97316">${d.p||"-"}</td><td style="color:#3b82f6">${d.c||"-"}</td><td style="color:#a78bfa">${d.f||"-"}</td><td style="text-align:center">${d.trained?"✅":"-"}</td></tr>`).join("")}
      </table></div>
    </div>
  `;
}

function weeklyTrain(){
  const weeks={};
  allData.filter(d=>d.trained).forEach(d=>{const k=weekStart(d.date);weeks[k]=(weeks[k]||0)+1;});
  return Object.entries(weeks).map(([w,c])=>({week:w.slice(5),count:c})).slice(-12);
}
function buildPR(){
  const map={};
  workouts.forEach(wo=>{wo.exercises?.forEach(ex=>{const maxW=Math.max(...ex.sets.map(s=>s.w));if(!map[ex.name])map[ex.name]=[];map[ex.name].push({date:wo.date,maxW});});});
  Object.keys(map).forEach(k=>map[k].sort((a,b)=>a.date>b.date?1:-1));
  return map;
}
function selectPR(name){prTab=prTab===name?null:name;renderAnalysis();}
function renderPRDetail(pr){
  if(!prTab||!pr[prTab]) return "";
  const data=pr[prTab];
  const allPR=Math.max(...data.map(d=>d.maxW));
  const latest=data[data.length-1]?.maxW;
  return `<div style="display:flex;gap:8px;margin-bottom:10px">
    <div class="kpi" style="flex:1"><div class="kpi-label">ALL TIME PR</div><div class="kpi-val" style="color:#f59e0b;font-size:20px">${allPR}kg</div></div>
    <div class="kpi" style="flex:1"><div class="kpi-label">最新</div><div class="kpi-val" style="color:#22c55e;font-size:20px">${latest}kg</div></div>
    <div class="kpi" style="flex:1"><div class="kpi-label">記録回数</div><div class="kpi-val" style="color:#3b82f6;font-size:20px">${data.length}</div></div>
  </div>${miniLineChart(data.map(d=>({date:d.date,weight:d.maxW})),"weight","#6c63ff")}`;
}
function buildScatter(){
  const s=[...allData].sort((a,b)=>a.date>b.date?1:-1);
  const pairs=[];
  for(let i=0;i+13<s.length;i+=7){
    const p7=s.slice(i,i+7),c7=s.slice(i+7,i+14);
    const pW=p7.filter(d=>d.weight).map(d=>d.weight);
    const cW=c7.filter(d=>d.weight).map(d=>d.weight);
    if(pW.length<2||cW.length<2)continue;
    const cal=c7.filter(d=>d.cal).map(d=>d.cal);
    if(cal.length<3)continue;
    pairs.push({cal:Math.round(avg(cal)),weightDelta:parseFloat((avg(cW)-avg(pW)).toFixed(3))});
  }
  let c=null;
  if(pairs.length>=3){
    const xs=pairs.map(d=>d.cal),ys=pairs.map(d=>d.weightDelta);
    const mx=avg(xs),my=avg(ys);
    const num=xs.reduce((s,x,i)=>s+(x-mx)*(ys[i]-my),0);
    const dx=Math.sqrt(xs.reduce((s,x)=>s+(x-mx)**2,0));
    const dy=Math.sqrt(ys.reduce((s,y)=>s+(y-my)**2,0));
    c=dx*dy===0?0:num/(dx*dy);
  }
  return {data:pairs,corr:c};
}
function renderScatter(data){
  if(!data.length) return '<div style="color:#64748b;font-size:12px;text-align:center;padding:20px">データ不足</div>';
  const xs=data.map(d=>d.cal),ys=data.map(d=>d.weightDelta);
  const xMin=Math.min(...xs),xMax=Math.max(...xs),xRange=xMax-xMin||1;
  const yMin=Math.min(...ys),yMax=Math.max(...ys),yRange=yMax-yMin||1;
  const dots=data.map(d=>{
    const x=((d.cal-xMin)/xRange)*90+5;
    const y=100-((d.weightDelta-yMin)/yRange)*90-5;
    return `<div class="scatter-dot" style="left:${x}%;bottom:${100-y}%"></div>`;
  }).join("");
  return `<div class="scatter-wrap">${dots}<div style="position:absolute;bottom:50%;left:0;right:0;border-top:1px dashed #64748b"></div></div>`;
}

init();
</script>
