    ].map(d => TRAIN_DATES.has(d.date) ? {...d,trained:1} : d);

    const fmt    = d => d ? d.slice(5).replace("-","/") : "";
    const toDay  = () => new Date().toISOString().slice(0,10);
    const avgArr = arr => arr.length ? arr.reduce((a,b)=>a+b,0)/arr.length : 0;

    function mergeData(seed, stored=[]) {
      const map = {};
      [...seed,...stored].forEach(r => { map[r.date]={...(map[r.date]||{}),...r}; });
      return Object.values(map).sort((a,b)=>a.date>b.date?1:-1);
    }

    function corr(xs,ys) {
      const n=xs.length; if(n<3) return null;
      const mx=avgArr(xs),my=avgArr(ys);
      const num=xs.reduce((s,x,i)=>s+(x-mx)*(ys[i]-my),0);
      const dx=Math.sqrt(xs.reduce((s,x)=>s+(x-mx)**2,0));
      const dy=Math.sqrt(ys.reduce((s,y)=>s+(y-my)**2,0));
      return dx*dy===0?0:num/(dx*dy);
    }

    function getWeekStart(dateStr) {
      const d=new Date(dateStr); d.setDate(d.getDate()-d.getDay()+1);
      return d.toISOString().slice(0,10);
    }

    const C={bg:"#0f1117",card:"#1a1d27",border:"#2a2d3a",accent:"#6c63ff",
      green:"#22c55e",red:"#ef4444",yellow:"#f59e0b",blue:"#3b82f6",

    const inp={background:"#0f1117",border:`1px solid ${C.border}`,borderRadius:8,

    const CustomTip=({active,payload,label})=>{
      if(!active||!payload?.length) return null;
      return React.createElement('div',{style:{background:C.card,border:`1px solid ${C.border}`,borderRadius:8,padding:"8px 12px",fontSize:12}},
        React.createElement('div',{style:{color:C.muted,marginBottom:4}},label),
        payload.map((p,i)=>React.createElement('div',{key:i,style:{color:p.color||C.text}},`${p.name}: ${typeof p.value==="number"?p.value.toFixed(1):p.value}`))
      );
    };

    function TDEECard({allData}) {
      const r = useMemo(()=>{
        const sorted=[...allData].sort((a,b)=>a.date>b.date?1:-1);
        const last=sorted[sorted.length-1]?.date; if(!last) return null;
        const mid=new Date(last); mid.setDate(mid.getDate()-14);
        const start=new Date(last); start.setDate(start.getDate()-27);
        const ms=mid.toISOString().slice(0,10), ss=start.toISOString().slice(0,10);
        const prev=sorted.filter(d=>d.date>=ss&&d.date<ms);
        const curr=sorted.filter(d=>d.date>=ms);
        const all28=sorted.filter(d=>d.date>=ss);
        const wF=prev.filter(d=>d.weight).map(d=>d.weight);
        const wL=curr.filter(d=>d.weight).map(d=>d.weight);
        const cal=all28.filter(d=>d.cal).map(d=>d.cal);
        if(wF.length<3||wL.length<3||cal.length<10) return null;
        const wd=avgArr(wL)-avgArr(wF);
        const ac=avgArr(cal);
        const tdee=Math.round(ac-(wd*7700/28));
        return {tdee,ac:Math.round(ac),wd:wd.toFixed(3),wF:avgArr(wF).toFixed(2),wL:avgArr(wL).toFixed(2),
          surplus:Math.round(ac-tdee),calDays:cal.length,wFd:wF.length,wLd:wL.length,
          range:`${ss.slice(5)}〜${last.slice(5)}`};
      },[allData]);
      if(!r) return React.createElement('div',{style:{...cs,color:C.muted,textAlign:"center",padding:20,fontSize:13}},"データ蓄積中（直近28日のデータが必要）");
      const def=r.surplus<0;
      return React.createElement('div',{style:cs},
        React.createElement('div',{style:{color:C.text,fontWeight:600,fontSize:14,marginBottom:14}},"🔥 推定消費カロリー（直近28日）"),
        React.createElement('div',{style:{textAlign:"center",marginBottom:14}},
          React.createElement('div',{style:{color:C.muted,fontSize:12}},"推定TDEE"),
          React.createElement('div',{style:{color:C.accent,fontSize:40,fontWeight:800,lineHeight:1.1}},r.tdee.toLocaleString()),
          React.createElement('div',{style:{color:C.muted,fontSize:12}},"kcal / 日")
        ),
        React.createElement('div',{style:{background:"#0f1117",borderRadius:8,padding:"10px 12px",fontSize:12}},
          React.createElement('div',{style:{color:C.muted,fontWeight:600,marginBottom:6}},r.range),
          React.createElement('div',{style:{display:"grid",gridTemplateColumns:"1fr 1fr",gap:"3px 10px",color:C.muted}},
            React.createElement('span',null,"前半14日 平均体重"),React.createElement('span',{style:{color:C.text,textAlign:"right"}},`${r.wF}kg（${r.wFd}日）`),
            React.createElement('span',null,"後半14日 平均体重"),React.createElement('span',{style:{color:C.text,textAlign:"right"}},`${r.wL}kg（${r.wLd}日）`),
            React.createElement('span',null,"体重変化"),React.createElement('span',{style:{color:parseFloat(r.wd)<0?C.green:C.red,textAlign:"right"}},`${parseFloat(r.wd)>0?"+":""}${r.wd}kg`),
            React.createElement('span',null,"平均摂取"),React.createElement('span',{style:{color:C.text,textAlign:"right"}},`${r.ac.toLocaleString()} kcal`),
            React.createElement('span',null,"データ日数"),React.createElement('span',{style:{color:C.text,textAlign:"right"}},`${r.calDays}日`)
          )
        )
      );

    function App() {
      const [tab,setTab]=useState("dash");

      },[]);

      const handleSave=async()=>{
        const entry={date:form.date,
          ...(form.weight&&{weight:parseFloat(form.weight)}),

        const stored=JSON.parse(localStorage.getItem("bodymaker-data")||"[]");

      const saveGoal=()=>{ localStorage.setItem("bodymaker-goal",JSON.stringify(goal)); };

      const addExercise=()=>{

      };

      const prData=useMemo(()=>{
        const map={};
        workouts.forEach(wo=>{ wo.exercises?.forEach(ex=>{ const maxW=Math.max(...ex.sets.map(s=>s.w)); if(!map[ex.name]) map[ex.name]=[]; map[ex.name].push({date:wo.date,maxW,sets:ex.sets.length,reps:ex.sets[0]?.r}); }); });
        Object.keys(map).forEach(k=>map[k].sort((a,b)=>a.date>b.date?1:-1));
        return map;
      },[workouts]);

      const weeklyReport=useMemo(()=>{
        const now=new Date(); const ws=getWeekStart(now.toISOString().slice(0,10));
        const prev=new Date(ws); prev.setDate(prev.getDate()-7); const ps=prev.toISOString().slice(0,10);
        const calc=arr=>({avgCal:Math.round(avgArr(arr.filter(d=>d.cal).map(d=>d.cal))||0),avgP:Math.round(avgArr(arr.filter(d=>d.p).map(d=>d.p))||0),trainDays:arr.filter(d=>d.trained).length,avgSleep:avgArr(arr.filter(d=>d.sleep).map(d=>d.sleep)).toFixed(1)});
        return {this:calc(allData.filter(d=>d.date>=ws)),last:calc(allData.filter(d=>d.date>=ps&&d.date<ws))};
      },[allData]);

      const goalCalc=useMemo(()=>{
        if(!goal.weight) return null;
        const ws=allData.filter(d=>d.weight); if(ws.length<14) return null;
        const recent=ws.slice(-14);
        const wFirst=avgArr(recent.slice(0,7).map(d=>d.weight));
        const wLast=avgArr(recent.slice(7).map(d=>d.weight));
        const rate=(wLast-wFirst)/7;
        if(rate>=0) return {msg:"現在体重が増加傾向のため予測不可"};
        const current=ws[ws.length-1].weight;
        const diff=current-parseFloat(goal.weight);
        const days=Math.ceil(diff/Math.abs(rate));
        const eta=new Date(); eta.setDate(eta.getDate()+days);
        return {days,eta:eta.toLocaleDateString("ja-JP"),ratePerWeek:(rate*7).toFixed(2),current};
      },[allData,goal]);

      const latest=allData.filter(d=>d.weight).slice(-1)[0]||{};

      },[allData,period]);

      const corrData=useMemo(()=>{
        const s=[...allData].sort((a,b)=>a.date>b.date?1:-1);
        const pairs=[];
        for(let i=0;i+13<s.length;i+=7){
          const p7=s.slice(i,i+7),c7=s.slice(i+7,i+14);

      const calWCorr=corrData.length>=3?corr(corrData.map(d=>d.cal),corrData.map(d=>d.weightDelta)):null;
